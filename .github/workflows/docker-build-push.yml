name: Docker

on:
  push:
    branches: ["main"]

jobs:
  docker:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - name: Build Image
        run: docker build -t izharusmani/nodejsapp:${{ github.sha }} .

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Push Image
        run: |
          docker push izharusmani/nodejsapp:${{ github.sha }}
          docker tag izharusmani/nodejsapp:${{ github.sha }} izharusmani/nodejsapp:latest
          docker push izharusmani/nodejsapp:latest